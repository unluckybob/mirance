name: Build Mirance.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Download AnyMiro Runtime
      run: |
        # Download AnyMiro runtime from release
        Invoke-WebRequest -Uri "https://github.com/unluckybob/mirance/releases/download/v1.0/Mirance-Runtime.zip" -OutFile "Mirance-Runtime.zip"
        $size = (Get-Item "Mirance-Runtime.zip").Length
        Write-Host "Downloaded $size bytes"
        if ($size -gt 1000) {
            Expand-Archive -Path "Mirance-Runtime.zip" -DestinationPath "AnyMiro" -Force
        } else {
            Write-Host "Download failed - using fallback"
        }
        
    - name: Restore packages
      run: dotnet restore src/Mirance.sln
        
    - name: Build
      run: dotnet build src/Mirance.sln -c Release --no-restore
        
    - name: Create release folder
      run: |
        mkdir Mirance
        
    - name: Upload WPF App as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mirance-Release
        path: Mirance/
