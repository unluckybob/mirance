name: Build Mirance.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Download AnyMiro Runtime
      run: |
        # Download AnyMiro runtime from release
        curl -L -o Mirance-Runtime.zip "https://github.com/unluckybob/mirance/releases/download/v1.0/Mirance-Runtime.zip"
        Expand-Archive -Path "Mirance-Runtime.zip" -DestinationPath "AnyMiro" -Force
        
    - name: Restore packages
      run: dotnet restore src/Mirance.sln
        
    - name: Build
      run: dotnet build src/Mirance.sln -c Release --no-restore
        
    - name: Copy AnyMiro files to output
      run: |
        Copy-Item -Path "AnyMiro\*" -Destination "src/Mirance.App/bin/Release/net8.0-windows/" -Recurse -Force
        
    - name: Create release folder
      run: |
        mkdir Mirance
        Copy-Item -Path "src/Mirance.App/bin/Release/net8.0-windows\*" -Destination "Mirance/" -Recurse -Force
        
    - name: Rename to Mirance.exe
      run: |
        # Rename AnyMiro.exe to Mirance.exe in release folder
        $exe = Get-ChildItem "Mirance" -Filter "AnyMiro.exe" | Select-Object -First 1
        if ($exe) {
            Rename-Item -Path $exe.FullName -NewName "Mirance.exe"
        }
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mirance-Release
        path: Mirance/
