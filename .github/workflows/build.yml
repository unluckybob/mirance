name: Build and Release Mirance.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore
      run: dotnet restore src/Mirance.sln
        
    - name: Build
      run: dotnet build src/Mirance.sln -c Release --no-restore
        
    - name: Create Portable folder
      run: mkdir Mirance-Portable
        
    - name: Create Installer folder
      run: mkdir Mirance-Installer
        
    - name: Copy Portable files
      run: |
        Copy-Item -Path "src\Mirance.App\bin\Release\net8.0-windows\*" -Destination "Mirance-Portable\" -Recurse -Force
        Copy-Item -Path "AnyMiro.Filtered\*" -Destination "Mirance-Portable\" -Recurse -Force
        Copy-Item -Path "debug.bat" -Destination "Mirance-Portable\"
        Copy-Item -Path "Mirance.ico" -Destination "Mirance-Portable\"
        
    - name: Copy Installer files
      run: |
        Copy-Item -Path "src\Mirance.App\bin\Release\net8.0-windows\*" -Destination "Mirance-Installer\" -Recurse -Force
        Copy-Item -Path "AnyMiro.Filtered\*" -Destination "Mirance-Installer\" -Recurse -Force
        Copy-Item -Path "Mirance-Setup\Setup.bat" -Destination "Mirance-Installer\"
        Copy-Item -Path "debug.bat" -Destination "Mirance-Installer\"
        Copy-Item -Path "Mirance.ico" -Destination "Mirance-Installer\"
        
    - name: Upload Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mirance-Portable
        path: Mirance-Portable/
        retention-days: 30
        
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mirance-Installer
        path: Mirance-Installer/
        retention-days: 30
