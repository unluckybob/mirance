name: Build Mirance.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Build
      run: |
        # Try to restore and build
        dotnet restore src/Mirance.sln 2>&1 || echo "Restore failed - using pre-built"
        dotnet build src/Mirance.sln -c Release --no-restore 2>&1 || echo "Build failed - using pre-built"
        
    - name: Create release package
      run: |
        # Create Mirance folder
        mkdir -p Mirance/Release
        
        # Copy AnyMiro as Mirance
        cp AnyMiro/AnyMiro.exe Mirance/Release/Mirance.exe
        
        # Copy all DLLs
        cp -r AnyMiro/* Mirance/Release/
        
        # Compress
        powershell -Command "Compress-Archive -Path Mirance/Release/* -DestinationPath Mirance-Release.zip -Force"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mirance-Release
        path: |
          Mirance-Release.zip
          Mirance/Release/
