name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: List project files
      run: |
        dir src
    
    - name: Build with dotnet CLI
      run: |
        dotnet build src/Mirance.sln --configuration Release --no-restore
    
    - name: List output
      if: success()
      run: |
        dir src/*/bin/Release/*.dll 2>$null; dir src/*/bin/Release/*.exe 2>$null