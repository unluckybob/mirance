name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check files
      run: |
        dir /b src\*.sln
        dir /b src\Mirance.*\*.csproj
        dir /b src\Mirance.*\*.cs
        dir /b src\Mirance.*\*.xaml

    - name: List all source files
      run: |
        Get-ChildItem -Path src -Recurse -Include *.cs,*.xaml,*.csproj,*.sln | Select-Object FullName | Format-Table -AutoSize
    
    - name: Count files
      run: |
        $cs = (Get-ChildItem -Path src -Recurse -Filter "*.cs").Count
        $xaml = (Get-ChildItem -Path src -Recurse -Filter "*.xaml").Count
        $csproj = (Get-ChildItem -Path src -Recurse -Filter "*.csproj").Count
        Write-Host "C# files: $cs"
        Write-Host "XAML files: $xaml"
        Write-Host "Project files: $csproj"
        if ($cs -gt 0 -and $xaml -gt 0 -and $csproj -gt 0) { exit 0 } else { exit 1 }