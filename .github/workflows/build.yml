name: Build Mirance.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Create release package
      run: |
        # Create Mirance folder
        mkdir -p Mirance/Release
        
        # Copy AnyMiro as Mirance
        cp AnyMiro/AnyMiro.exe Mirance/Release/Mirance.exe
        
        # Copy all DLLs
        cp -r AnyMiro/* Mirance/Release/
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mirance-Release
        path: Mirance/Release/
