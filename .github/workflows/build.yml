name: Build Mirance.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore
      run: dotnet restore src/Mirance.sln
        
    - name: Build
      run: dotnet build src/Mirance.sln -c Release --no-restore
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mirance-bin
        path: src/Mirance.App/bin/Release/
